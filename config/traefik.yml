api:
    dashboard: true

log:
    level: INFO

# Example tracing configuration kept for learning purposes.
# Replace or remove this block before using it on a real server.
tracing:
    otlp:
        grpc:
            endpoint: observability.example.com:4317
            headers:
                Authorization: "Basic REPLACE_WITH_REAL_CREDENTIALS"
                organization: your-observability-org
                stream-name: traefik
            insecure: false


accessLog: {}

entryPoints:
    web:
        address: ":80"
        http:
            redirections:
                entryPoint:
                    to: "websecure"
                    scheme: "https"
                    permanent: true

    websecure:
        address: ":443"
        http:
            tls:
                certResolver: "default"

providers:
    docker:
        watch: true
        exposedByDefault: false
        network: "web"

    file:
        directory: "/etc/traefik/dynamic"
        watch: true

certificatesResolvers:
    default:
        acme:
            email: "ops@example.com"
            storage: "/etc/traefik/acme.json"
            caServer: "https://acme-v02.api.letsencrypt.org/directory"
            tlsChallenge: { }
