version: '3'

services:
    reverse-proxy:
        image: traefik:${TRAEFIK_VERSION}
        container_name: traefik
        ports:
            - "80:80"
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
            - ./config_dev:/etc/traefik
        restart: always
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.api.rule=Host(`prod.fullfrontend.test`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
            - "traefik.http.routers.api.service=api@internal"
        networks:
            - web
networks:
    web:
        external: true
