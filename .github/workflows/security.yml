name: Security

on:
  pull_request:
  push:
    branches:
      - master
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  shellcheck:
    name: Shell Scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install --yes shellcheck

      - name: Lint shell scripts
        run: |
          shellcheck \
            deploy.sh \
            down.sh \
            restart.sh \
            scripts/generate-dev-compose.sh \
            scripts/generate-https-certs.sh

  trivy-fs:
    name: Trivy Repository Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scanners: secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-fs-results.sarif

      - name: Upload SARIF
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-fs

  trivy-images:
    name: Trivy Docker Images
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        image:
          - traefik:v3.6.7
          - fullfrontend/mkcert:latest

    steps:
      - name: Scan image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ matrix.image }}
          scan-type: image
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-image-results.sarif

      - name: Upload SARIF
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif
          category: ${{ matrix.image }}
