api:
    dashboard: true

log:
    level: INFO

accessLog: { }


entryPoints:
    web:
        address: ":80"
        http:
            redirections:
                entryPoint:
                    to: "websecure"
                    scheme: "https"
                    permanent: true

    websecure:
        address: ":443"
        http:
            tls:
                certResolver: "default"

providers:
    docker:
        watch: true
        exposedByDefault: false
        network: "web"
    file:
        directory: "/etc/traefik/dynamic"
        watch: true

